/**:
  ros__parameters:
    cuda_stream_type: 1

    # Map
    voxel_size: 0.02
    num_cameras: 1                  # cam0 only for now
    use_tf_transforms: true
    mapping_type: "static_tsdf"
    global_frame: "livox_frame"
    pose_frame: "livox_frame"

    # Rates
    tick_period_ms: 10
    integrate_depth_rate_hz: 15.0
    integrate_color_rate_hz: 5.0
    integrate_lidar_rate_hz: 10.0
    update_mesh_rate_hz: 5.0
    update_esdf_rate_hz: 5.0
    publish_layer_rate_hz: 5.0
    publish_debug_vis_rate_hz: 1.0
    decay_tsdf_rate_hz: 5.0
    decay_dynamic_occupancy_rate_hz: 10.0
    clear_map_outside_radius_rate_hz: 1.0

    # Diagnostic logging — flip on if depth integration stalls.
    print_rates_to_console: false
    print_timings_to_console: false
    print_delays_to_console: false
    print_queue_drops_to_console: true
    print_statistics_on_console_period_ms: 10000

    # ESDF
    esdf_mode: "3d"
    publish_esdf_distance_slice: true

    # Inputs
    use_color: true
    use_depth: true
    # use_lidar=true was tried — fails with "LiDAR intrinsics are
    # inconsistent with the received pointcloud" because the Livox
    # MID-360 is non-repetitive (variable point count per frame) and
    # nvblox's grid projection expects a fixed lidar_width × lidar_height
    # beam count. Depth integration from cam0 alone reconstructs the
    # workspace cleanly; the LiDAR cloud stays available on the
    # dashboard's point-cloud layer (rendered separately).
    use_lidar: false
    lidar_width: 1024
    lidar_height: 64
    lidar_min_valid_range_m: 0.2
    lidar_max_valid_range_m: 5.0
    use_non_equal_vertical_fov_lidar_params: false

    maximum_input_queue_length: 10

    map_clearing_radius_m: 2.0
    map_clearing_frame_id: "livox_frame"

    input_qos: "SENSOR_DATA"

    esdf_slice_bounds_visualization_attachment_frame_id: "livox_frame"
    esdf_slice_bounds_visualization_side_length: 4.0
    workspace_height_bounds_visualization_attachment_frame_id: "livox_frame"
    workspace_height_bounds_visualization_side_length: 4.0
    layer_visualization_min_tsdf_weight: 0.1
    layer_visualization_exclusion_height_m: 2.0
    layer_visualization_exclusion_radius_m: 2.0
