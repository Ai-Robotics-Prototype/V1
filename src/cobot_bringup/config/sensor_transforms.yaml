# Sensor frame transforms — livox_frame is the root.
#
# Each block is "this sensor's pose in the LiDAR frame":
#     translation: where the sensor sits relative to the LiDAR origin
#         x  = forward distance (LiDAR +X)
#         y  = left distance    (LiDAR +Y)
#         z  = height           (LiDAR +Z)
#     rotation: quaternion (qx, qy, qz, qw) for the BASE optical->ROS
#         rotation. Keep this at the standard (0.5, -0.5, 0.5, -0.5)
#         that yields [[0,0,1],[-1,0,0],[0,-1,0]]; this is a coordinate
#         convention (image axes -> body axes), not the mounting tilt.
#     rpy_correction: Euler-angle nudge applied AFTER the base rotation,
#         in degrees, extrinsic XYZ (roll about world X, pitch about
#         world Y, yaw about world Z). Use this for the physical
#         orientation of the camera relative to the LiDAR.
#         Sign convention: +pitch = nose-DOWN (RHR around +Y / left).
#         So a camera looking 70° down from horizontal: pitch = +70.
#
# Refine these numbers physically (tape measure) or with
#   python3 scripts/interactive_align.py [cam0_to_lidar|cam1_to_lidar]

# Cameras mounted on ball-joint clamps at the table edge, both
# pointing down at ~70° from horizontal toward the workspace.
# rpy_correction = [0, +70, 0] = pitch 70° down. If the cloud appears
# inverted (sky-down), flip the sign to -70 — the ball-joint may have
# rotated the camera 180° about its yaw axis from the nominal mount.

cam0_to_lidar:
  translation:    [0.30, 0.05, 0.25]
  rotation:       [0.5, -0.5, 0.5, -0.5]
  rpy_correction: [0.0, 70.0, 0.0]

cam1_to_lidar:
  translation:    [0.10, 0.15, 0.25]
  rotation:       [0.5, -0.5, 0.5, -0.5]
  rpy_correction: [0.0, 70.0, 0.0]
