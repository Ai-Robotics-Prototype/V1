# Estun Codroid driver — declared parameters + safety gates.
#
# Load with:
#   ros2 run estun_driver estun_driver_node --ros-args --params-file <this>
# or via the launch file:
#   ros2 launch estun_driver estun_driver.launch.py
#
# Priority (highest wins):
#   1. `-p key:=value` on the CLI
#   2. --params-file loading this YAML
#   3. ESTUN_ROBOT_IP / ESTUN_ROBOT_PORT env vars (only for IP + port)
#   4. declare_parameter() default baked into the node

estun_driver:
  ros__parameters:
    # ── Connection ───────────────────────────────────────────────
    # Current cell target (isolated robot subnet):
    #   192.168.2.136   (Estun S10-140-ECO-V2 @ Norse, confirmed working
    #                    via scripts/posture.py on 2026-07-09)
    # Historic firmware default candidates:
    #   192.168.101.100 (Codroid S-series factory default)
    #   192.168.1.136   (some Gen2 CC10-A units on DHCP shipping profile)
    # Set via ESTUN_ROBOT_IP env for a per-cell override (see systemd
    # drop-in at /etc/default/roboai-estun).
    robot_ip:     "192.168.2.136"
    robot_port:   9000
    ui_origin_port: 9198     # Codroid UI HTTP port used for the WS Origin header
    auto_connect: true

    # ── Safety gates ─────────────────────────────────────────────
    # Read-only telemetry mirror. TRUE means every inbound write
    # path (jog / move / IO / command / project run) is REJECTED at
    # the subscription. This driver build has NO motion-write code
    # path implemented — flipping monitor_only to false does NOT
    # enable motion; a separate branch that re-adds the v2.3 write
    # paths is required first, gated on:
    #   1. WS raw log confirms shipped firmware's write-message shapes
    #   2. operator has cleared the cell
    #   3. deadman + limit clamps exercised on a bench
    monitor_only: true

    # ── Jog write path (second gate) ─────────────────────────────
    # Both gates must be open for /robot/jog_command to emit Robot/jog
    # frames: monitor_only:false AND allow_jog:true. Env override
    # ESTUN_ALLOW_JOG=1 wins over this YAML (same precedence as
    # ESTUN_ROBOT_IP). Default here is false so a stray YAML flip alone
    # cannot enable motion; the live test uses the env var only.
    allow_jog: false

    # Cartesian (mode:2) jog stays hard-gated on this build. The captured
    # protocol shape is implemented but not exercised on hardware; enabling
    # this without the joint-mode validation pass first is unsafe.
    allow_cartesian_jog: false

    # ── Power write path (third gate — SEPARATE from allow_jog) ──────────
    # /robot/power_command → enable / disable / clear_alarm. Wire verbs
    # captured from the factory UI at :9198 (single-arm branch of
    # useMultiarmWs): Robot/switchOn, Robot/switchOff, System/ClearError.
    # Env override ESTUN_ALLOW_POWER=1 wins over this YAML (same precedence
    # as ESTUN_ALLOW_JOG). Default false so a stray YAML flip alone cannot
    # enable a live command surface.
    #
    # Safety invariant: nothing in this driver auto-enables. Every
    # Robot/switchOn on the wire comes from an explicit operator gesture
    # on /robot/power_command. There is no enable-on-startup, no
    # enable-on-reconnect, no retry-on-failure. Disable and clear_alarm
    # are the "safing" path — they run under the same gate but are
    # *not* additionally gated by allow_jog: safing an arm must never
    # be gated harder than moving it.
    allow_power: false

    # ── Two-tier speed cap (staged raise 2026-07-16 safety pass) ──────
    #
    # jog_speed_cap is the HARDWARE-DERIVED ceiling — the point past
    # which the derived safety margins (limit clamp, collision stop_mm,
    # sigma governor) can no longer keep worst-case overrun distance
    # under a supervise-tick budget.
    #
    # operator_speed_limit is the OPERATIONALLY-ALLOWED ceiling the
    # operator is permitted to reach today. Effective_cap =
    #   min(jog_speed_cap, operator_speed_limit).
    #
    # Raise operator_speed_limit → 0.50 ONLY after ALL of:
    #   * Test B (limit-approach + collision-approach at 0.25) complete
    #     and captured in the test log at /opt/cobot/logs/testB-*.jsonl
    #   * One week of continuous cell operation at operator_speed_limit
    #     = 0.25 with zero unresolved 2xxx alarms
    #   * Independent review of the wire-log at
    #     /opt/cobot/logs/estun_ws_*.jsonl for that week showing no
    #     speed-cap-driven stops (deadman, singularity, limit clamp)
    # Raising this is a one-line YAML change and a systemd restart.
    # Do NOT raise the HARDWARE ceiling (jog_speed_cap) without a
    # separate safety-pass margin re-derivation.
    #
    # Margin math backing 0.50 (see estun_driver_node.py comment block
    # above _on_jog_command):
    #   - Limit clamp:   dyn margin = v_max × f × latency × 1.5
    #                    J1 @ f=0.50: 150 × 0.50 × 0.150 × 1.5 = 16.9° (was 2°)
    #                    J4 @ f=0.50: 180 × 0.50 × 0.150 × 1.5 = 20.3° (was 2°)
    #   - Collision stop_mm: base + (f - 0.15) × 1500 mm/s × 0.15s × 1.5
    #                    f=0.15 → 30 mm (unchanged baseline)
    #                    f=0.25 →  64 mm
    #                    f=0.50 → 148 mm
    #   - σ_soft scales × f / 0.15  (governor engages earlier at speed).
    #   - Deadman is time-based (0.300 s) — overrun distance at f=0.50:
    #                    J1 (150°/s × 0.50) × 0.300 s = 22.5° angular
    #                    ≈ 500 mm at flange with 1 m radius
    #     Note this in the log; do not silently rely on time-based deadman
    #     as the sole guard.
    jog_speed_cap:        0.50
    operator_speed_limit: 0.25

    # Robot/jogHeartbeat cadence. Captured protocol requires ~400 ms; the
    # controller stops motion when heartbeats stop.
    jog_heartbeat_s: 0.4

    # Freshness deadman: if /robot/jog_command doesn't refresh within
    # this window, the driver emits Robot/stopJog and tears down the
    # supervise timer. Set below jog_heartbeat_s (0.4 s) so a single
    # missed heartbeat halts motion before the controller notices.
    #
    # 2026-07-17: bumped 0.3 → 0.5 to tolerate observed 622 ms
    # dashboard-side GIL stalls (json.dumps of the 10 KB state blob
    # under 25 Hz starved the keepalive native thread mid-hold →
    # phantom staleness stops). Full rationale in the driver's
    # declare_parameter comment.
    # 2026-07-20: reverted 0.5 → 0.3 now that the dashboard-side GIL
    # source is fixed (serialization off-loop + 8 Hz broadcast during
    # holds). The 0.5 loosening was a workaround for the stall, not
    # a design choice — with the underlying stall gone the tighter
    # deadman is what we want.
    jog_freshness_timeout_s: 0.3

    # ── First-connect logging ────────────────────────────────────
    # Dumps every TX/RX WS frame to
    #   /opt/cobot/logs/estun_ws_YYYYMMDD_HHMMSS.jsonl
    # One rotated file per driver start. Ground truth for the v2.3
    # protocol shapes — leave on during bring-up.
    ws_log_raw: true

    # ── Collision guard: ground plane ─────────────────────────────
    # z of the PHYSICAL floor in the driver's base_link frame (mm).
    # base_link IS the base flange in the URDF — z=0 there is the
    # flange plane, NOT the floor. A mounted arm sits on some stand;
    # measure the stand height and set this to  -stand_height_mm.
    # Default -300 assumes a common 300 mm cell stand. Fit an exact
    # value with scripts/fit_ground_plane.py against the live LiDAR
    # cloud when the cell is finalised.
    # 2026-07-15 wedge: the old default (0) had the model reporting
    # normal poses as 87 mm from the "ground" and tripping the guard.
    ground_z_mm: -300.0

    # Collision guard escape / fallback speed caps. When the guard is
    # in the warn zone and the operator jogs in an OPENING direction,
    # commanded speed is clamped to escape_speed_frac. When the model
    # can find NO single-axis escape (deep pocket or bad model), the
    # driver still permits joint-mode jog at fallback_speed_frac with
    # a loud log line — the operator has an e-stop and outranks a
    # geometry model that might be wrong.
    collision_escape_speed_frac:   0.06
    collision_fallback_speed_frac: 0.03
