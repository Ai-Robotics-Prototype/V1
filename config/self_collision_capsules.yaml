# Auto-generated by scripts/fit_capsules.py — do not edit by hand.
# One capsule per URDF link, in the link's own frame (mm).
# capsule = segment from p0 to p1 + radius; distances measured
# in the base frame after per-tick FK.  Padding: 12.0 mm above raw fit.

capsules:
  base_link:
    p0: [-99.24, 35.5, 0.0]
    p1: [110.1, 35.5, 0.0]
    radius: 111.19
    # raw_max_radius=99.19 axis_length=209.34
  link1_shoulder:
    p0: [-110.66, 168.38, 0.04]
    p1: [79.94, 168.38, 0.04]
    radius: 106.68
    # raw_max_radius=94.68 axis_length=190.6
  link2_upper_arm:
    p0: [-3.96, -79.56, -0.26]
    p1: [-3.96, 761.28, -0.26]
    radius: 106.96
    # raw_max_radius=94.96 axis_length=840.84
  link3_forearm:
    p0: [-7.76, -60.45, 0.19]
    p1: [-7.76, 587.55, 0.19]
    radius: 81.34
    # raw_max_radius=69.34 axis_length=648.0
    # NOTE: this single-cap fit is used ONLY for other-link pairs
    # (base↔l3, l1↔l3, l3↔l6, l3↔ground, l3↔env). The l3↔l5 pair
    # uses mesh-mesh distance instead (see `mesh_pairs:` below).
    # A cylindrical capsule over-approximates the link's flat
    # rectangular ends by 40–50 mm at every bent pose — including
    # HOME — where real l3/l5 clearance stays a designed 46.8 mm.
    # Sub-slab, side-split, and dual-side-split fits all reproduced
    # this floor. Only true geometry via mesh sampling recovers the
    # real gap.
  link4_wrist1:
    p0: [-136.4, -49.55, -0.0]
    p1: [-136.4, 88.8, -0.0]
    radius: 72.53
    # raw_max_radius=60.53 axis_length=138.35
  link5_wrist2:
    p0: [-89.3, 66.03, 0.0]
    p1: [49.05, 66.03, 0.0]
    radius: 72.53
    # raw_max_radius=60.53 axis_length=138.35
    # Same treatment as link3 — single cap for other pairs, mesh-mesh
    # distance for the l3↔l5 pair only.
  link6_flange:
    p0: [2.4, -49.61, -2.07]
    p1: [2.4, 48.39, -2.07]
    radius: 61.0
    # raw_max_radius=49.0 axis_length=98.0

# Pair list — links checked for self-collision.
# Excluded: adjacent links (they touch at their shared joint by design)
# and pairs whose reachable envelopes cannot intersect given the fitted
# joint limits (±200° J1/J2/J4/J6, ±166° J3/J5).
#
# What we DO check (the plausible bump zones on an S10-140):
#   base_link  ↔ link3_forearm   (forearm can fold over the base column)
#   base_link  ↔ link4_wrist1    (wrist assembly diving toward the column)
#   base_link  ↔ link5_wrist2
#   base_link  ↔ link6_flange    (TCP-side hitting the base)
#   link1_shoulder ↔ link3_forearm
#   link1_shoulder ↔ link4_wrist1
#   link1_shoulder ↔ link5_wrist2
#   link1_shoulder ↔ link6_flange
#   link2_upper_arm ↔ link4_wrist1  (wrist folded onto the upper arm)
#   link2_upper_arm ↔ link5_wrist2
#   link2_upper_arm ↔ link6_flange
#   link3_forearm ↔ link5_wrist2   (wrist folded onto forearm)
#   link3_forearm ↔ link6_flange
# Also a synthetic "ground" pseudo-link at the base footprint (z=0 in
# base frame) so descending J2/J3 into the table shows up. Excluded pairs:
#   adjacent (i, i+1) for i = 0..5 — always touching at joint
#   base_link ↔ link1_shoulder — coaxial
#   base_link ↔ link2_upper_arm — reachable envelope stays clear of
#     the base column for any J2 within ±200° given the shoulder offset
#     (verified in the 10k FK sweep).

pairs:
  - [base_link, link3_forearm]
  - [base_link, link4_wrist1]
  - [base_link, link5_wrist2]
  - [base_link, link6_flange]
  - [link1_shoulder, link3_forearm]
  - [link1_shoulder, link4_wrist1]
  - [link1_shoulder, link5_wrist2]
  - [link1_shoulder, link6_flange]
  - [link2_upper_arm, link4_wrist1]
  - [link2_upper_arm, link5_wrist2]
  - [link2_upper_arm, link6_flange]
  # link3_forearm ↔ link5_wrist2 is handled via mesh-mesh distance
  # instead (see mesh_pairs below). It is NOT listed here because
  # any cylinder-cylinder capsule fit inherently over-approximates by
  # 40–50 mm at every arm pose, producing constant phantoms.
  - [link3_forearm, link6_flange]
  - [__ground__, link3_forearm]
  - [__ground__, link4_wrist1]
  - [__ground__, link5_wrist2]
  - [__ground__, link6_flange]

# Pairs that use MESH-MESH ground-truth distance instead of capsule-
# capsule. Each named link must have a matching .npy vertex cloud at
# estun_driver/mesh_verts/<link>.npy (stride-4 subsample of the URDF
# GLB, ~15 kB each). Runtime cost: ~5 ms per pair per tick, well
# inside the 50 Hz budget.
#
# Currently only link3↔link5 warrants this: the mesh clearance stays
# at a designed 46.8 mm across a wide range of poses (the wrist stub
# link4 mechanically enforces the gap), and cylindrical capsules
# fitted to link3's rectangular distal flange and link5's chunky
# block always report -5 to -50 mm at that separation, regardless of
# radius. Mesh sampling recovers the true value within 0.3 mm.
mesh_pairs:
  - [link3_forearm, link5_wrist2]

# Per-pair threshold overrides. Global defaults come from the driver
# (collision_warn_distance_mm / collision_stop_distance_mm). Overrides
# below win when a specific pair is closer than any other and would
# otherwise trip warn spuriously.
#
# link3_forearm ↔ link5_wrist2 — the mesh clearance stays a designed
# 46.8–51 mm across any J4/J5 combo because link4's mechanical body
# physically enforces the gap; J1/J2/J3/J6 are kinematically invariant
# to the pair (both links are children of J4). Global 80 mm warn is
# ALWAYS lit for this pair during any normal fold; 60 mm mostly is too.
# The chip in the 3D view chrome takes over for warn-band presentation
# (non-blocking); the stop-band popup only fires below stop. Keep stop
# at 30 mm as a real "something is wrong with the mesh model or geometry"
# tripwire.
pair_thresholds:
  - pair: [link3_forearm, link5_wrist2]
    warn: 60.0
    stop: 30.0

# Ground plane pseudo-body — flat at z=0 in base frame, treated as
# an infinite half-space for distance queries. The base column itself
# is already covered by the base_link capsule.
ground_plane:
  z: 0.0
  # radius interpretation — 0, since it's a half-space.
