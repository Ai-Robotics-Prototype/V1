# Pair list — links checked for self-collision.
# Excluded: adjacent links (they touch at their shared joint by design)
# and pairs whose reachable envelopes cannot intersect given the fitted
# joint limits (±200° J1/J2/J4/J6, ±166° J3/J5).
#
# What we DO check (the plausible bump zones on an S10-140):
#   base_link  ↔ link3_forearm   (forearm can fold over the base column)
#   base_link  ↔ link4_wrist1    (wrist assembly diving toward the column)
#   base_link  ↔ link5_wrist2
#   base_link  ↔ link6_flange    (TCP-side hitting the base)
#   link1_shoulder ↔ link3_forearm
#   link1_shoulder ↔ link4_wrist1
#   link1_shoulder ↔ link5_wrist2
#   link1_shoulder ↔ link6_flange
#   link2_upper_arm ↔ link4_wrist1  (wrist folded onto the upper arm)
#   link2_upper_arm ↔ link5_wrist2
#   link2_upper_arm ↔ link6_flange
#   link3_forearm ↔ link5_wrist2   (wrist folded onto forearm)
#   link3_forearm ↔ link6_flange
# Also a synthetic "ground" pseudo-link at the base footprint (z=0 in
# base frame) so descending J2/J3 into the table shows up. Excluded pairs:
#   adjacent (i, i+1) for i = 0..5 — always touching at joint
#   base_link ↔ link1_shoulder — coaxial
#   base_link ↔ link2_upper_arm — reachable envelope stays clear of
#     the base column for any J2 within ±200° given the shoulder offset
#     (verified in the 10k FK sweep).

pairs:
  - [base_link, link3_forearm]
  - [base_link, link4_wrist1]
  - [base_link, link5_wrist2]
  - [base_link, link6_flange]
  - [link1_shoulder, link3_forearm]
  - [link1_shoulder, link4_wrist1]
  - [link1_shoulder, link5_wrist2]
  - [link1_shoulder, link6_flange]
  - [link2_upper_arm, link4_wrist1]
  - [link2_upper_arm, link5_wrist2]
  - [link2_upper_arm, link6_flange]
  # link3_forearm ↔ link5_wrist2 removed 2026-07-15: capsule
  # over-approximation fires false-positive at ~14 mm in bent poses
  # where the real slim geometry stays >150 mm apart. Re-enable
  # after we swap the PCA-cylinder capsules for tighter convex
  # hulls / composite primitives.
  # - [link3_forearm, link5_wrist2]
  - [link3_forearm, link6_flange]
  - [__ground__, link3_forearm]
  - [__ground__, link4_wrist1]
  - [__ground__, link5_wrist2]
  - [__ground__, link6_flange]

# Ground plane pseudo-body — flat at z=0 in base frame, treated as
# an infinite half-space for distance queries. The base column itself
# is already covered by the base_link capsule.
ground_plane:
  z: 0.0
  # radius interpretation — 0, since it's a half-space.
